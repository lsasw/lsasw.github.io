<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="搜索博客文章。" />
    <title>搜索 | 七智的博客</title>
    <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="/img/favicon.png" />
    <link rel="apple-touch-icon" href="/img/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/css/blog.css" />
    <script src="/js/search-data.js" defer></script>
    <script src="/js/site-search.js" defer></script>
  </head>
  <body>
    <div class="container">
      <header class="site-header">
        <a class="site-name" href="/" aria-label="七智的博客">
          <span>七智的博客</span>
        </a>
        <p class="tagline">把每天做过的事，沉淀成能复用的作品。</p>
        <nav class="site-nav" aria-label="主导航">
          <a href="/">首页</a>
          <a href="/archive.html">所有文章</a>
          <a href="/search.html" aria-current="page">搜索</a>
          <a href="/about.html">关于</a>
          <a href="https://github.com/lsasw">GitHub</a>
        </nav>
      </header>

      <main>
        <section class="search-page">
          <header class="page-title">
            <h1>搜索</h1>
            <p>输入关键词，查找标题、摘要和正文内容。</p>
          </header>

          <form class="search-panel" action="/search.html" role="search">
            <label class="sr-only" for="search-query">搜索文章</label>
            <input id="search-query" type="search" name="q" placeholder="例如：AI、工作流、写作系统" autocomplete="off" autofocus />
            <button type="submit">搜索</button>
          </form>

          <p class="search-status" data-search-status>输入关键词开始搜索。</p>
          <ol class="search-results" data-search-results></ol>
        </section>
      </main>

      <footer class="site-footer">
        <p>© 2026 七智的博客. Powered by GitHub Pages.</p>
      </footer>
    </div>
  </body>
</html>
