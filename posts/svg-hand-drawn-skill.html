          <h1>把 SVG 变成手绘动画：svg-hand-drawn-skill</h1>
          <p>
            <a href="https://github.com/shaom/svg-hand-drawn-skill">svg-hand-drawn-skill</a>
            是一个很适合放进博客的小工具：把普通 SVG 处理成像手写、手画出来的动态效果，并生成可直接预览的页面。
          </p>
          <p>
            它的可玩性在于低成本试错。可以把 logo、流程图、签名、图标或课程封面丢进去，调速度、看路径一笔一笔出现，再把效果嵌到文章里。静态图会变成一个小演示，比单纯贴图更容易抓住读者注意力。
          </p>
