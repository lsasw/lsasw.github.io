          <h1>用 AI 辅助写代码的一些原则</h1>
          <p>
            AI 可以加快试错，但不能替代判断。越是让它写代码，越要把目标、边界和验证方式说清楚。
          </p>
          <p>
            我更愿意把 AI 当成结对工程师：先读现有代码，再小步修改，最后用测试和浏览器检查结果。
          </p>
