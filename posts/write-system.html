          <h1>搭建自己的长期写作系统</h1>
          <p>
            我想要的博客不是一次性装修，而是一个每天都能顺手更新的系统。
            先保持页面简单，再把写作流程固定下来。
          </p>
          <h2>第一步</h2>
          <p>先写短文章。每篇只解决一个问题，留下一个可执行动作。</p>
          <h2>完成标准</h2>
          <p>文章发布后，能在归档页找到，读完后知道下一步该做什么。</p>
