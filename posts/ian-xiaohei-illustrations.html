          <h1>给中文文章配小黑手绘图：ian-xiaohei-illustrations</h1>
          <p>
            <a href="https://github.com/helloianneo/ian-xiaohei-illustrations">ian-xiaohei-illustrations</a>
            是一个给中文文章生成正文配图的 Codex Skill。它会先读文章，找出适合视觉化的判断、流程、状态或隐喻，再生成 16:9 白底手绘图。
          </p>
          <p>
            它的可玩性在于“小黑”不是装饰，而是画面里的动作承担者。可以给方法论、复盘、AI 工作流、知识库文章配几张怪诞但清楚的小图。使用时别贪多：一张图只讲一个核心点，中文标注越短越稳。
          </p>
