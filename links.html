  <body>
    <div class="container">
      <header class="site-header">
        <a class="site-name" href="/" aria-label="七智的博客">
          <span>七智的博客</span>
        </a>
        <p class="tagline">把每天做过的事，沉淀成能复用的作品。</p>
        <nav class="site-nav" aria-label="主导航">
          <a href="/">首页</a>
          <a href="/archive.html">所有文章</a>
          <a href="/search.html">搜索</a>
          <a href="/links.html" aria-current="page">友链</a>
          <a href="/about.html">关于</a>
          <a href="https://github.com/lsasw">GitHub</a>
        </nav>
        <form class="site-search" action="/search.html" role="search">
          <label class="sr-only" for="site-search-links">搜索文章</label>
          <input id="site-search-links" type="search" name="q" placeholder="搜索文章" autocomplete="off" />
          <button type="submit" aria-label="搜索">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m21 21-4.2-4.2M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z" />
            </svg>
          </button>
        </form>
      </header>

      <main>
        <article class="links-page">
          <header class="page-title">
            <h1>友链</h1>
            <p>放一些长期更新、真实做事、值得反复阅读的网站。</p>
          </header>

          <section class="friend-links" aria-label="友情链接">
            <a class="friend-link" href="https://github.com/lsasw">
              <span class="friend-name">七智的 GitHub</span>
              <span class="friend-url">github.com/lsasw</span>
              <span class="friend-desc">项目、代码和一些正在打磨的工具会先放在这里。</span>
            </a>
          </section>

          <section class="note">
            <h2>交换友链</h2>
            <p>
              如果你也在长期写博客，可以通过 GitHub 联系我。建议带上网站名称、链接、一句话介绍和头像或图标地址。
              我更愿意放持续更新、有真实内容、页面干净的网站。
            </p>
          </section>
        </article>
      </main>

      <footer class="site-footer">
