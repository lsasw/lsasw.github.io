<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="关于博客。" />
    <title>关于 | 七智的博客</title>
    <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="/img/favicon.png" />
    <link rel="apple-touch-icon" href="/img/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/css/blog.css" />
    <script src="/js/search-data.js" defer></script>
    <script src="/js/site-search.js" defer></script>
  </head>
  <body>
    <div class="container">
      <header class="site-header">
        <a class="site-name" href="/" aria-label="七智的博客">
          <span>七智的博客</span>
        </a>
        <p class="tagline">把每天做过的事，沉淀成能复用的作品。</p>
        <nav class="site-nav" aria-label="主导航">
          <a href="/">首页</a>
          <a href="/archive.html">所有文章</a>
          <a href="/search.html">搜索</a>
          <a href="/links.html">友链</a>
          <a href="/about.html" aria-current="page">关于</a>
          <a href="https://github.com/lsasw">GitHub</a>
        </nav>
        <form class="site-search" action="/search.html" role="search">
          <label class="sr-only" for="site-search-about">搜索文章</label>
          <input id="site-search-about" type="search" name="q" placeholder="搜索文章" autocomplete="off" />
          <button type="submit" aria-label="搜索">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m21 21-4.2-4.2M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z" />
            </svg>
          </button>
        </form>
      </header>

      <main>
        <article class="article">
          <h1>关于这个博客</h1>
          <p>
            这是一个放在 GitHub Pages 上的博客，用来记录技术学习、项目推进、工作流整理和复盘。
            我希望它不是一个展示页，而是一个长期可维护的写作系统。
          </p>
          <p>
            如果你正在维护这个站点，最简单的更新方式是复制一篇 `posts` 目录下的文章，
            修改标题和正文，再把链接加到 `archive.html` 和首页最近文章里。
          </p>
        </article>
      </main>

      <footer class="site-footer">
        <p>© 2026 七智的博客. Powered by GitHub Pages.</p>
      </footer>
    </div>
  </body>
</html>
