          <p>
            这是一个放在 GitHub Pages 上的个人博客，用来记录技术学习、项目推进、工作流整理和复盘。
            我希望它不是一个展示页，而是一个长期可维护的写作系统。
          </p>
          <p>
            如果你正在维护这个站点，最简单的更新方式是复制一篇 `posts` 目录下的文章，
            修改标题和正文，再把链接加到 `archive.html` 和首页最近文章里。
          </p>
